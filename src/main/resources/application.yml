server:
  port: ${USER_SERVICE_PORT:8082}

spring:
  application:
    name: inno-user-service

  datasource:
    url: jdbc:postgresql://${USER_DB_HOST:postgres-user}:${USER_DB_PORT:5432}/${USER_DB_NAME:user_db}
    username: ${USER_DB_USERNAME:postgres}
    password: ${USER_DB_PASSWORD:17052007}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8088/realms/innowise-realm}

  liquibase:
    enabled: true
    change-log: classpath:/db/changelog/changelog-master.xml

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

keycloak:
  server-url: ${KEYCLOAK_URL:http://localhost:8088}
  realm: ${KEYCLOAK_REALM:innowise-realm}
  client-id: ${KEYCLOAK_CLIENT_ID:innowise-client}
  client-secret: ${KEYCLOAK_CLIENT_SECRET:}

swagger:
  keycloak:
    auth-url: ${KEYCLOAK_URL:http://localhost:8088}/realms/innowise-realm/protocol/openid-connect/auth
    token-url: ${KEYCLOAK_URL:http://localhost:8088}/realms/innowise-realm/protocol/openid-connect/token

spring.security.oauth2:
  client:
    registration:
      user-service-client:
        client-id: ${KEYCLOAK_AUTH_CLIENT_ID:innowise-client}
        client-secret: ${KEYCLOAK_AUTH_CLIENT_SECRET:}
        authorization-grant-type: authorization_code
        redirect-uri: ${KEYCLOAK_REDIRECT_URI:http://localhost:8082/login/oauth2/code/keycloak}
        scope: openid,profile,email
    provider:
      user-service-client:
        issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8088/realms/innowise-realm}
        authorization-uri: ${KEYCLOAK_URL:http://localhost:8088}/realms/innowise-realm/protocol/openid-connect/auth
        token-uri: ${KEYCLOAK_URL:http://localhost:8088}/realms/innowise-realm/protocol/openid-connect/token


springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    docExpansion: none
    tryItOutEnabled: true
    filter: true
    persistAuthorization: true
    display-request-duration: true
    oauth:
      clientId: innowise-client
      usePkceWithAuthorizationCodeGrant: true
    show-extensions: true
    show-common-extensions: true
    use-root-path: false
    disable-swagger-default-url: true
    urls:
      - url: /v3/api-docs
        name: User Service API
  
  default-produces-media-type: application/json
  default-consumes-media-type: application/json
  
  cache:
    disabled: false
    ttl: 0
  
  model-and-view-allowed: false
  
  override-with-generic-response: false
  
  show-actuator: true
  
  server:
    base-path: /
    context-path: /
  




management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
    prometheus:
      enabled: true
  metrics:
    distribution:
      percentiles-histogram:
        '[http.server.requests]': true
    tags:
      application: ${spring.application.name:inno-user-service}
      service: user-service
  prometheus:
    metrics:
      export:
        enabled: true
  observations:
    key-values:
      application: ${spring.application.name}
      service: user-service
  tracing:
    enabled: true
    sampling:
      probability: 1.0  
  otlp:
    tracing:
      endpoint: ${TEMPO_ENDPOINT:http://tempo:4318/v1/traces}
  loki:
    url: ${LOKI_URL:http://loki:3100}



